<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sealiet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: black; margin: 0; overflow: hidden; }
        .animation-container { position: relative; width: 200px; height: 250px; margin-top: 50px; }
        .circular-image {
            width: 200px; height: 200px; border-radius: 50%; position: absolute;
            top: 0; left: 50%; transform: translateX(-50%); z-index: 10;
            animation: move-up 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55) 1s forwards;
        }
        .rectangular-gif-wrapper {
            position: absolute; left: 50%; top: 100px; transform: translateX(-50%);
            width: 500px; height: 150px; z-index: 5; overflow: hidden; margin: 0 auto;
        }
        .rectangular-gif {
            width: 100%; height: 100%; object-fit: cover; border-radius: 16px;
            transform: scaleX(0); transform-origin: center; opacity: 0;
            animation: grow-and-fade-in 0.6s ease-out 1.2s forwards;
        }
        @keyframes move-up { from { transform: translateY(0) translateX(-50%); } to { transform: translateY(-100px) translateX(-50%); } }
        @keyframes grow-and-fade-in { from { transform: scaleX(0); opacity: 0; } to { transform: scaleX(1); opacity: 1; } }
        .button-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; opacity: 0; animation: fade-in 0.5s ease-in 2s forwards; }
        .square-image-button { width: 60px; height: 60px; border-radius: 8px; cursor: pointer; transition: transform 0.3s ease-in-out; }
        .square-image-button:hover { transform: scale(1.1); }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    
    <audio id="bg-music"></audio>

    <div class="animation-container">
        <img src="https://files.catbox.moe/nq5nb1.png" alt="pfp" class="circular-image bg-gray-700">
        <div class="rectangular-gif-wrapper">
            <img src="https://files.catbox.moe/fgh7x0.gif" alt="gif" class="rectangular-gif bg-gray-600">
        </div>
    </div>
    
    <div class="button-container">
       <a href="https://www.roblox.com/users/1262326470/profile" target="_blank" rel="noopener noreferrer"><img src="https://files.catbox.moe/muhqbs.jpg" alt="roblox" class="square-image-button"></a>
       <a href="https://discord.gg/zrp" target="_blank" rel="noopener noreferrer"><img src="https://files.catbox.moe/39er5q.jpg" alt="discord" class="square-image-button"></a>
    </div>

    <script>
        const titleText = "sealiet";
        let titleIndex = 0;
        let isDeleting = false;

        function animateTitle() {
            document.title = titleIndex === 0 ? "\u200E" : titleText.substring(0, titleIndex);

            if (!isDeleting) {
                if (titleIndex < titleText.length) {
                    titleIndex++;
                    setTimeout(animateTitle, 300);
                } else {
                    isDeleting = true;
                    setTimeout(animateTitle, 1000);
                }
            } else {
                if (titleIndex > 0) {
                    titleIndex--;
                    setTimeout(animateTitle, 300);
                } else {
                    isDeleting = false;
                    setTimeout(animateTitle, 500);
                }
            }
        }
        animateTitle();

        const songs = [
            "https://files.catbox.moe/50ek1m.mp3",
            "https://files.catbox.moe/9j39ur.mp3"
        ];

        songs.sort(() => Math.random() - 0.5);

        const audio = document.getElementById('bg-music');
        let currentSongIndex = 0;

        function playNextSong() {
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            setTimeout(() => {
                audio.src = songs[currentSongIndex];
                audio.play();
            }, 3000);
        }

        document.addEventListener('click', () => {
            if (!audio.src) {
                audio.src = songs[currentSongIndex];
                audio.volume = 0.6;
                audio.play();
            }
        }, { once: true });

        audio.addEventListener('ended', playNextSong);
    </script>
</body>
</html>
